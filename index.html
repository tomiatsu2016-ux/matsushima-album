<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松島会アルバム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 2.2rem;
      letter-spacing: 0.15em;
      color: #f0c27f;
      margin-bottom: 8px;
    }

    header p {
      color: #aaa;
      font-size: 0.95rem;
    }

    #photo-count {
      text-align: center;
      margin: 10px 0 20px;
      color: #888;
      font-size: 0.9rem;
    }

    /* グリッドギャラリー */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      background: #2a2a3e;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .gallery-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-item .video-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      pointer-events: none;
    }

    .gallery-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 20px 10px 8px;
      font-size: 0.8rem;
      color: #ddd;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-item:hover .caption {
      opacity: 1;
    }

    /* ライトボックス */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img,
    #lightbox video {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 6px;
      object-fit: contain;
    }

    #lightbox-caption {
      margin-top: 14px;
      color: #ccc;
      font-size: 0.95rem;
    }

    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }

    #lightbox-prev,
    #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: none;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #lightbox-prev:hover,
    #lightbox-next:hover {
      background: rgba(255,255,255,0.25);
    }

    #lightbox-prev { left: 10px; }
    #lightbox-next { right: 10px; }

    /* 写真がない場合 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }

    .empty-state h2 { font-size: 1.3rem; margin-bottom: 12px; color: #888; }
    .empty-state p { line-height: 1.8; font-size: 0.9rem; }
    .empty-state code {
      background: #2a2a3e;
      padding: 2px 8px;
      border-radius: 4px;
      color: #f0c27f;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>松島会アルバム</h1>
  <p>みんなの思い出</p>
</header>

<div id="photo-count"></div>

<div class="gallery" id="gallery"></div>

<div class="empty-state" id="empty-state" style="display:none;">
  <h2>まだ写真・動画がありません</h2>
  <p>
    <code>photos/</code> フォルダにファイルを入れてください。<br>
    画像: JPG, PNG, GIF, WebP, HEIC<br>
    動画: MP4, MOV, WebM
  </p>
</div>

<!-- ライトボックス -->
<div id="lightbox">
  <button id="lightbox-close">&times;</button>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <video id="lightbox-video" src="" controls playsinline style="display:none;"></video>
  <div id="lightbox-caption"></div>
  <button id="lightbox-next">&#8250;</button>
</div>

<footer>
  松島会 &mdash; 大切な思い出
</footer>

<script>
  // photos/ フォルダの画像を自動スキャン（GitHub Pages / ローカルサーバー用）
  // ローカルファイルで開く場合は下の PHOTOS 配列に手動で追加してください

  // ============================================================
  // メディアリスト（自動読み込みが使えない場合はここに手動追加）
  // 例: 'photos/IMG_001.jpg', 'photos/VID_001.mp4'
  const PHOTOS = [
    // 'photos/IMG_001.jpg',
    // 'photos/VID_001.mp4',
  ];
  // ============================================================

  const VIDEO_EXTS = ['mp4', 'mov', 'webm', 'm4v'];

  function isVideo(src) {
    const ext = src.split('.').pop().toLowerCase();
    return VIDEO_EXTS.includes(ext);
  }

  let currentIndex = 0;

  function buildGallery(photos) {
    const gallery = document.getElementById('gallery');
    const emptyState = document.getElementById('empty-state');
    const countEl = document.getElementById('photo-count');

    if (photos.length === 0) {
      emptyState.style.display = 'block';
      return;
    }

    const imgCount = photos.filter(s => !isVideo(s)).length;
    const vidCount = photos.filter(s => isVideo(s)).length;
    const parts = [];
    if (imgCount > 0) parts.push(`写真 ${imgCount} 枚`);
    if (vidCount > 0) parts.push(`動画 ${vidCount} 本`);
    countEl.textContent = parts.join(' / ');

    photos.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const nameLabel = src.split('/').pop().replace(/\.[^.]+$/, '');

      if (isVideo(src)) {
        const video = document.createElement('video');
        video.src = src;
        video.muted = true;
        video.preload = 'metadata';
        video.playsInline = true;
        video.addEventListener('loadeddata', () => { video.currentTime = 0.5; });

        const badge = document.createElement('div');
        badge.className = 'video-badge';
        badge.textContent = '▶ 動画';

        item.appendChild(video);
        item.appendChild(badge);
      } else {
        const img = document.createElement('img');
        img.src = src;
        img.alt = nameLabel;
        img.loading = 'lazy';
        item.appendChild(img);
      }

      const caption = document.createElement('div');
      caption.className = 'caption';
      caption.textContent = nameLabel;

      item.appendChild(caption);
      item.addEventListener('click', () => openLightbox(i, photos));
      gallery.appendChild(item);
    });
  }

  function openLightbox(index, photos) {
    currentIndex = index;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbVideo = document.getElementById('lightbox-video');
    const lbCap = document.getElementById('lightbox-caption');

    const src = photos[index];
    lbCap.textContent = src.split('/').pop().replace(/\.[^.]+$/, '');

    if (isVideo(src)) {
      lbImg.style.display = 'none';
      lbImg.src = '';
      lbVideo.style.display = 'block';
      lbVideo.src = src;
      lbVideo.play();
    } else {
      lbVideo.style.display = 'none';
      lbVideo.pause();
      lbVideo.src = '';
      lbImg.style.display = 'block';
      lbImg.src = src;
    }

    lb.classList.add('active');
    lb._photos = photos;
  }

  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    const lbVideo = document.getElementById('lightbox-video');
    lbVideo.pause();
    lbVideo.src = '';
    lb.classList.remove('active');
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  document.getElementById('lightbox-prev').addEventListener('click', () => {
    const lb = document.getElementById('lightbox');
    const photos = lb._photos;
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    openLightbox(currentIndex, photos);
  });

  document.getElementById('lightbox-next').addEventListener('click', () => {
    const lb = document.getElementById('lightbox');
    const photos = lb._photos;
    currentIndex = (currentIndex + 1) % photos.length;
    openLightbox(currentIndex, photos);
  });

  document.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
    if (e.key === 'Escape') closeLightbox();
    if (e.key === ' ') { e.preventDefault(); const v = document.getElementById('lightbox-video'); if (v.style.display !== 'none') v.paused ? v.play() : v.pause(); }
  });

  // GitHub Pages でホストする場合は photos-list.js が自動生成されます
  // ローカルで開く場合は上の PHOTOS 配列を使います
  if (PHOTOS.length > 0) {
    buildGallery(PHOTOS);
  } else {
    // photos-list.js (GitHub Actions で自動生成) があれば使う
    const script = document.createElement('script');
    script.src = 'photos-list.js';
    script.onload = () => {
      if (typeof PHOTO_LIST !== 'undefined') {
        buildGallery(PHOTO_LIST);
      } else {
        document.getElementById('empty-state').style.display = 'block';
      }
    };
    script.onerror = () => {
      document.getElementById('empty-state').style.display = 'block';
    };
    document.head.appendChild(script);
  }
</script>

</body>
</html>
