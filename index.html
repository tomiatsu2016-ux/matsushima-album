<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松島会アルバム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 2.2rem;
      letter-spacing: 0.15em;
      color: #f0c27f;
      margin-bottom: 8px;
    }

    header p { color: #aaa; font-size: 0.95rem; }

    #photo-count {
      text-align: center;
      margin: 10px 0 20px;
      color: #888;
      font-size: 0.9rem;
    }

    /* イベントセクション */
    .event-section {
      max-width: 1400px;
      margin: 0 auto 30px;
      padding: 0 20px;
    }

    .event-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px 16px;
      background: #2a2a3e;
      border-radius: 8px;
      cursor: pointer;
    }

    .event-header:hover { background: #333352; }

    .event-icon { font-size: 1.2rem; }

    .event-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #f0c27f;
      flex: 1;
    }

    .event-count {
      font-size: 0.85rem;
      color: #888;
    }

    .event-edit-btn {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .event-edit-btn:hover { border-color: #f0c27f; color: #f0c27f; }

    /* グリッドギャラリー */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      background: #2a2a3e;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .gallery-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-item .video-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      pointer-events: none;
    }

    .gallery-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 24px 8px 6px;
      font-size: 0.75rem;
      color: #ddd;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-item:hover .caption { opacity: 1; }

    .caption .sender { color: #f0c27f; }

    /* ライトボックス */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lightbox.active { display: flex; }

    #lightbox img,
    #lightbox video {
      max-width: 90vw;
      max-height: 65vh;
      border-radius: 6px;
      object-fit: contain;
    }

    #lightbox-info {
      margin-top: 14px;
      text-align: center;
      max-width: 600px;
      width: 90vw;
    }

    #lightbox-event {
      color: #f0c27f;
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    #lightbox-detail {
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    #lightbox-memo {
      color: #ccc;
      font-size: 0.9rem;
      font-style: italic;
      margin-bottom: 8px;
    }

    .lb-edit-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid #555;
      color: #ccc;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin: 4px;
    }

    .lb-edit-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }

    #lightbox-prev,
    #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: none;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #lightbox-prev:hover,
    #lightbox-next:hover { background: rgba(255,255,255,0.25); }

    #lightbox-prev { left: 10px; }
    #lightbox-next { right: 10px; }

    /* 編集モーダル */
    #edit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    #edit-modal.active { display: flex; }

    .edit-box {
      background: #2a2a3e;
      border-radius: 12px;
      padding: 24px;
      width: 90vw;
      max-width: 400px;
    }

    .edit-box h3 {
      color: #f0c27f;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    .edit-box label {
      display: block;
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .edit-box input,
    .edit-box textarea {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid #555;
      border-radius: 6px;
      color: #eee;
      font-size: 0.95rem;
      font-family: inherit;
    }

    .edit-box textarea { height: 80px; resize: vertical; }

    .edit-box input:focus,
    .edit-box textarea:focus { border-color: #f0c27f; outline: none; }

    .edit-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    .edit-actions button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-save { background: #f0c27f; color: #1a1a2e; font-weight: bold; }
    .btn-cancel { background: #444; color: #ccc; }

    /* 写真がない場合 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }

    .empty-state h2 { font-size: 1.3rem; margin-bottom: 12px; color: #888; }
    .empty-state p { line-height: 1.8; font-size: 0.9rem; }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <h1>松島会アルバム</h1>
  <p>みんなの思い出</p>
</header>

<div id="photo-count"></div>
<div id="gallery-container"></div>

<div class="empty-state" id="empty-state" style="display:none;">
  <h2>まだ写真・動画がありません</h2>
</div>

<!-- ライトボックス -->
<div id="lightbox">
  <button id="lightbox-close">&times;</button>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <video id="lightbox-video" src="" controls playsinline style="display:none;"></video>
  <div id="lightbox-info">
    <div id="lightbox-event"></div>
    <div id="lightbox-detail"></div>
    <div id="lightbox-memo"></div>
    <button class="lb-edit-btn" id="lb-edit-btn">✏️ 編集・メモ</button>
  </div>
  <button id="lightbox-next">&#8250;</button>
</div>

<!-- 編集モーダル -->
<div id="edit-modal">
  <div class="edit-box">
    <h3>📝 写真情報を編集</h3>
    <label>イベント名</label>
    <input type="text" id="edit-event" placeholder="例: 忘年会 2026">
    <label>メモ</label>
    <textarea id="edit-memo" placeholder="自由にメモを入力..."></textarea>
    <div class="edit-actions">
      <button class="btn-cancel" id="edit-cancel">キャンセル</button>
      <button class="btn-save" id="edit-save">保存</button>
    </div>
  </div>
</div>

<footer>
  松島会 &mdash; 大切な思い出
</footer>

<script>
  const BOT_URL = 'https://matsushima-bot.onrender.com';
  const VIDEO_EXTS = ['mp4', 'mov', 'webm', 'm4v'];

  let allPhotos = [];
  let metadata = {};
  let currentIndex = 0;

  function isVideo(src) {
    const ext = src.split('.').pop().toLowerCase();
    return VIDEO_EXTS.includes(ext);
  }

  function getFilename(src) {
    return src.split('/').pop();
  }

  function getMeta(src) {
    const fn = getFilename(src);
    return metadata[fn] || {};
  }

  // イベントごとにグループ化
  function groupByEvent(photos) {
    const groups = {};
    photos.forEach(src => {
      const m = getMeta(src);
      const event = m.event || '未分類';
      if (!groups[event]) groups[event] = [];
      groups[event].push(src);
    });
    return groups;
  }

  function buildGallery(photos) {
    const container = document.getElementById('gallery-container');
    const emptyState = document.getElementById('empty-state');
    const countEl = document.getElementById('photo-count');

    container.innerHTML = '';

    if (photos.length === 0) {
      emptyState.style.display = 'block';
      return;
    }

    const imgCount = photos.filter(s => !isVideo(s)).length;
    const vidCount = photos.filter(s => isVideo(s)).length;
    const parts = [];
    if (imgCount > 0) parts.push(`写真 ${imgCount} 枚`);
    if (vidCount > 0) parts.push(`動画 ${vidCount} 本`);
    countEl.textContent = parts.join(' / ');

    const groups = groupByEvent(photos);
    const sortedEvents = Object.keys(groups).sort((a, b) => {
      // 日付が含まれるものを先に
      return a.localeCompare(b, 'ja');
    });

    sortedEvents.forEach(eventName => {
      const eventPhotos = groups[eventName];
      const section = document.createElement('div');
      section.className = 'event-section';

      const header = document.createElement('div');
      header.className = 'event-header';
      header.innerHTML = `
        <span class="event-icon">📅</span>
        <span class="event-name">${eventName}</span>
        <span class="event-count">${eventPhotos.length}枚</span>
      `;

      const gallery = document.createElement('div');
      gallery.className = 'gallery';

      eventPhotos.forEach(src => {
        const globalIndex = photos.indexOf(src);
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const m = getMeta(src);
        const nameLabel = getFilename(src).replace(/\.[^.]+$/, '');

        if (isVideo(src)) {
          const video = document.createElement('video');
          video.src = src;
          video.muted = true;
          video.preload = 'metadata';
          video.playsInline = true;
          video.addEventListener('loadeddata', () => { video.currentTime = 0.5; });

          const badge = document.createElement('div');
          badge.className = 'video-badge';
          badge.textContent = '▶ 動画';

          item.appendChild(video);
          item.appendChild(badge);
        } else {
          const img = document.createElement('img');
          img.src = src;
          img.alt = nameLabel;
          img.loading = 'lazy';
          item.appendChild(img);
        }

        const caption = document.createElement('div');
        caption.className = 'caption';
        let capText = '';
        if (m.sender) capText += `<span class="sender">${m.sender}</span> `;
        if (m.date) capText += m.date;
        if (m.memo) capText += `<br>${m.memo}`;
        caption.innerHTML = capText || nameLabel;

        item.appendChild(caption);
        item.addEventListener('click', () => openLightbox(globalIndex, photos));
        gallery.appendChild(item);
      });

      section.appendChild(header);
      section.appendChild(gallery);
      container.appendChild(section);
    });
  }

  function openLightbox(index, photos) {
    currentIndex = index;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbVideo = document.getElementById('lightbox-video');

    const src = photos[index];
    const m = getMeta(src);

    if (isVideo(src)) {
      lbImg.style.display = 'none';
      lbImg.src = '';
      lbVideo.style.display = 'block';
      lbVideo.src = src;
      lbVideo.play();
    } else {
      lbVideo.style.display = 'none';
      lbVideo.pause();
      lbVideo.src = '';
      lbImg.style.display = 'block';
      lbImg.src = src;
    }

    document.getElementById('lightbox-event').textContent = m.event || '未分類';
    document.getElementById('lightbox-detail').textContent =
      `${m.sender || ''} ${m.date || ''} ${m.time || ''}`.trim();
    document.getElementById('lightbox-memo').textContent = m.memo || '';

    lb.classList.add('active');
    lb._photos = photos;
  }

  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    const lbVideo = document.getElementById('lightbox-video');
    lbVideo.pause();
    lbVideo.src = '';
    lb.classList.remove('active');
  }

  // 編集モーダル
  function openEditModal() {
    const lb = document.getElementById('lightbox');
    const photos = lb._photos;
    const src = photos[currentIndex];
    const m = getMeta(src);

    document.getElementById('edit-event').value = m.event || '';
    document.getElementById('edit-memo').value = m.memo || '';
    document.getElementById('edit-modal').classList.add('active');
  }

  async function saveEdit() {
    const lb = document.getElementById('lightbox');
    const photos = lb._photos;
    const src = photos[currentIndex];
    const fn = getFilename(src);

    const newEvent = document.getElementById('edit-event').value;
    const newMemo = document.getElementById('edit-memo').value;

    // ローカル更新
    if (!metadata[fn]) metadata[fn] = {};
    metadata[fn].event = newEvent;
    metadata[fn].memo = newMemo;

    // 表示を更新
    document.getElementById('lightbox-event').textContent = newEvent || '未分類';
    document.getElementById('lightbox-memo').textContent = newMemo || '';

    document.getElementById('edit-modal').classList.remove('active');

    // サーバーに保存
    try {
      await fetch(`${BOT_URL}/api/update-meta`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: fn, event: newEvent, memo: newMemo }),
      });
    } catch (err) {
      console.warn('保存に失敗しましたが、表示は更新されています');
    }

    // ギャラリーを再描画
    buildGallery(allPhotos);
  }

  // イベントリスナー
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  document.getElementById('lightbox-prev').addEventListener('click', () => {
    const photos = document.getElementById('lightbox')._photos;
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    openLightbox(currentIndex, photos);
  });

  document.getElementById('lightbox-next').addEventListener('click', () => {
    const photos = document.getElementById('lightbox')._photos;
    currentIndex = (currentIndex + 1) % photos.length;
    openLightbox(currentIndex, photos);
  });

  document.getElementById('lb-edit-btn').addEventListener('click', openEditModal);
  document.getElementById('edit-save').addEventListener('click', saveEdit);
  document.getElementById('edit-cancel').addEventListener('click', () => {
    document.getElementById('edit-modal').classList.remove('active');
  });

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('edit-modal').classList.contains('active')) return;
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
    if (e.key === 'Escape') closeLightbox();
    if (e.key === ' ') { e.preventDefault(); const v = document.getElementById('lightbox-video'); if (v.style.display !== 'none') v.paused ? v.play() : v.pause(); }
  });

  // 初期化：写真リスト＋メタデータを読み込み
  async function init() {
    // メタデータ読み込み
    try {
      const res = await fetch('photos-meta.json');
      if (res.ok) metadata = await res.json();
    } catch (e) {}

    // 写真リスト読み込み
    try {
      const script = document.createElement('script');
      script.src = 'photos-list.js';
      script.onload = () => {
        if (typeof PHOTO_LIST !== 'undefined') {
          allPhotos = PHOTO_LIST;
          buildGallery(allPhotos);
        } else {
          document.getElementById('empty-state').style.display = 'block';
        }
      };
      script.onerror = () => {
        document.getElementById('empty-state').style.display = 'block';
      };
      document.head.appendChild(script);
    } catch (e) {
      document.getElementById('empty-state').style.display = 'block';
    }
  }

  init();
</script>

</body>
</html>
